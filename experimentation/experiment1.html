    <script>
        // making h capital and reversing letters
// sequence
        var myText = "happy horse";
        var newString = '';
        var reversed = myText.split("").reverse().join(""); 

        console.log(myText); 
        // selection making h capital
        for (var i=0; i<myText.length;i++){
            if (myText [i] === 'h') {
                console.log(myText[i]);
                newString += myText[i].toUpperCase();
            }
            else {
                newString +=myText[i];
            }
            // reverse and the new uppercase
        }
        console.log(newString + reversed);
